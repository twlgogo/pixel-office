<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Office</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }
    
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    
    /* Phaser 游戏画布区域 */
    #game-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 0;
    }
    
    /* 右侧 Agent 列表侧边栏 */
    #sidebar {
      width: 240px;
      background-color: #16213e;
      border-left: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    
    #sidebar-header {
      padding: 16px;
      background-color: #0f3460;
      color: #e8e8e8;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }
    
    #agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    /* Agent 列表项 */
    .agent-item {
      padding: 12px;
      margin-bottom: 8px;
      background-color: #1a1a2e;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .agent-item:hover {
      background-color: #0f3460;
    }
    
    .agent-item.active {
      background-color: #0f3460;
      border: 1px solid #e94560;
    }
    
    .agent-name {
      color: #e8e8e8;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .agent-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
    }
    
    .status-online {
      background-color: #00c853;
      color: #fff;
    }
    
    .status-offline {
      background-color: #757575;
      color: #fff;
    }
    
    .status-working {
      background-color: #ff6d00;
      color: #fff;
    }
    
    .status-thinking {
      background-color: #6200ea;
      color: #fff;
    }
    
    .status-idle {
      background-color: #00b8d4;
      color: #fff;
    }
    
    .agent-message {
      font-size: 10px;
      color: #9e9e9e;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-time {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    /* ========================================
       Phase 3: 响应式适配
       ======================================== */
    
    /* 小屏幕（< 768px）：侧边栏变为底部抽屉 */
    @media (max-width: 767px) {
      #app {
        flex-direction: column;
      }
      
      #sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: auto;
        max-height: 50vh;
        border-left: none;
        border-top: 2px solid #0f3460;
        border-radius: 16px 16px 0 0;
        transform: translateY(calc(100% - 60px));
        transition: transform 0.3s ease;
        z-index: 1000;
      }
      
      #sidebar.expanded {
        transform: translateY(0);
      }
      
      /* 底部抽屉展开按钮 */
      #sidebar::before {
        content: '🤖 AI Agents';
        display: block;
        padding: 16px;
        background-color: #0f3460;
        color: #e8e8e8;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        cursor: pointer;
      }
      
      /* 展开/收起指示器 */
      #sidebar-toggle {
        display: flex;
        justify-content: center;
        padding: 8px;
        cursor: pointer;
        background-color: #0f3460;
      }
      
      #sidebar-toggle::after {
        content: '▲';
        font-size: 12px;
        color: #9e9e9e;
        transition: transform 0.3s;
      }
      
      #sidebar.expanded #sidebar-toggle::after {
        transform: rotate(180deg);
      }
      
      /* Phaser 画布在小屏幕上占满 */
      #game-container {
        width: 100%;
        height: calc(100% - 60px);
      }
    }
    
    /* 大屏幕：隐藏抽屉切换按钮 */
    @media (min-width: 768px) {
      #sidebar-toggle {
        display: none;
      }
    }
    
    /* ========================================
       聊天面板样式（由 JS 动态创建）
       ======================================== */
    
    /* 滚动条样式 */
    #agent-list::-webkit-scrollbar,
    #chat-panel #chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    
    #agent-list::-webkit-scrollbar-track,
    #chat-panel #chat-messages::-webkit-scrollbar-track {
      background: #1a1a2e;
    }
    
    #agent-list::-webkit-scrollbar-thumb,
    #chat-panel #chat-messages::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 3px;
    }
    
    /* ========================================
       移动端聊天面板全屏
       ======================================== */
    @media (max-width: 767px) {
      #chat-panel {
        border-radius: 0 !important;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BwW1HqnU.js"></script>
</head>
<body>
  <div id="app">
    <!-- Phaser 游戏画布 -->
    <div id="game-container"></div>
    
    <!-- Agent 列表侧边栏 -->
    <div id="sidebar">
      <div id="sidebar-header">🤖 AI Agents</div>
      <div id="sidebar-toggle"></div>
      <div id="agent-list">
        <!-- Agent 项目将由 JS 动态插入 -->
        <div style="color: #757575; text-align: center; padding: 20px; font-size: 12px;">
          暂无连接
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 响应式：侧边栏抽屉切换
    document.addEventListener('DOMContentLoaded', () => {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');
      if (sidebar && toggle) {
        // 点击整个 header 或 toggle 区域切换
        sidebar.addEventListener('click', (e) => {
          if (e.target === sidebar || e.target === toggle || e.target === sidebar.querySelector('#sidebar-header')) {
            sidebar.classList.toggle('expanded');
          }
        });
      }
    });
  </script>
</body>
</html>
